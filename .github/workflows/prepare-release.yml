name: Prepare Release

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: prepare-release-develop
  cancel-in-progress: false

jobs:
  prepare-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!startsWith(github.event.head_commit.message, 'chore: release') &&
       !startsWith(github.event.head_commit.message, 'chore(develop): release'))
    runs-on: ubuntu-24.04

    steps:
      - name: Guard branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::prepare-release must run on develop. Got: ${{ github.ref }}"
            exit 1
          fi

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_MERGE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: develop
          skip-github-release: true

      - name: Auto-merge release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MERGE_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr="$(gh pr list --state open --label 'autorelease: pending' --json number --jq '.[0].number // empty')"
          if [ -z "$pr" ]; then
            echo "No open release PR; nothing to merge."
            exit 0
          fi
          gh pr merge "$pr" --squash
          gh pr edit "$pr" --remove-label "autorelease: pending"
