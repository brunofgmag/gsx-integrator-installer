name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: Version expected in VERSION.txt (MAJOR.MINOR.PATCH)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      release_exists: ${{ steps.duplicate-check.outputs.exists }}
      build_ref: ${{ steps.buildref.outputs.ref }}
    steps:
      - name: Verify branch
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/main" ]; then
            echo "::error::deploy must run on main. Got: $REF"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Validate VERSION.txt
        id: read
        env:
          REQ_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION.txt)"
          echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::VERSION.txt must be MAJOR.MINOR.PATCH (got '$version')"; exit 1; }
          if [ -n "$REQ_VERSION" ] && [ "$REQ_VERSION" != "$version" ]; then
            echo "::error::Requested $REQ_VERSION does not match VERSION.txt ($version)"; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check duplicate
        id: duplicate-check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.read.outputs.tag }}
          VER: ${{ steps.read.outputs.version }}
        run: |
          set -euo pipefail
          zip="gsx-integrator-installer-$VER.zip"
          sha="$zip.sha256"
          if names="$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null)"; then
            if grep -qxF "$zip" <<<"$names" && grep -qxF "$sha" <<<"$names"; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Release $TAG already published with both assets; nothing to do."
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Release $TAG exists but is missing assets; rebuilding and re-uploading."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve commit
        id: buildref
        env:
          TAG: ${{ steps.read.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::notice::Tag $TAG already exists; building from the tagged commit."
            echo "ref=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build + Package
    needs: version
    if: needs.version.outputs.release_exists == 'false'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.version.outputs.build_ref }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-build-env

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Config Release -SkipTests

      - name: Stage bundle
        shell: pwsh
        run: |
          $stage = 'staging/gsx-integrator-installer'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path 'build/release/bin/*' -Destination $stage -Recurse -Force

      - name: Package + Hash
        shell: pwsh
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          $zip = "gsx-integrator-installer-$env:VER.zip"
          Compress-Archive -Path 'staging/gsx-integrator-installer' -DestinationPath $zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath "$zip.sha256" -Encoding ascii -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bundle
          path: |
            gsx-integrator-installer-*.zip
            gsx-integrator-installer-*.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish
    needs: [ version, build ]
    if: needs.version.outputs.release_exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-bundle

      - name: Extract release notes
        id: notes
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          out=release-notes.md
          if [ -f CHANGELOG.md ]; then
            awk -v v="$VER" '
              $0 ~ "^## \\["v"\\]" {f=1; next}
              f && /^## / {exit}
              f {print}
            ' CHANGELOG.md > "$out"
          fi
          [ -s "$out" ] || echo "Release v$VER" > "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::notice::Tag $TAG already exists; reusing it."
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Publish
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: gsx-integrator-installer ${{ needs.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            gsx-integrator-installer-${{ needs.version.outputs.version }}.zip
            gsx-integrator-installer-${{ needs.version.outputs.version }}.zip.sha256
